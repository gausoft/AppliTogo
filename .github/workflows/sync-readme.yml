name: Sync README

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 06:00 UTC
  workflow_dispatch:       # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate README from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/generate_readme.py

      - name: Open / update Pull Request if README changed
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(readme): sync from africans_bc"
          title: "chore(readme): sync from africans_bc"
          body: |
            🤖 Mise à jour automatique du README à partir de la base **africans_bc**.

            - Source : `scripts/generate_readme.py`
            - Déclenché par : `${{ github.event_name }}`
            - Run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: bot/sync-readme
          delete-branch: true
          add-paths: README.md

      - name: Merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
